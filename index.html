  <!-- ══ Lightbox for screenshots ══════════════════════════════ -->
  <div class="lightbox" id="lightbox" aria-hidden="true">

  </div>

  <script src="script.js"></script>
  <script>
    (function () {
      const box = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      const closeBtn = document.getElementById('lightbox-close');

      function open(src, alt) {
        img.src = src;
        img.alt = alt || '';
        box.classList.add('open');
        box.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }
      function close() {
        box.classList.remove('open');
        box.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        // clear after transition to save memory
        setTimeout(() => { if (!box.classList.contains('open')) img.src = ''; }, 250);
      }

      document.querySelectorAll('.walk-step img, .walk-full img').forEach(el => {
        el.style.cursor = 'zoom-in';
        el.addEventListener('click', () => open(el.src, el.alt));
      });

      box.addEventListener('click', (e) => {
        if (e.target === box || e.target === img) close();
      });
      closeBtn.addEventListener('click', close);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && box.classList.contains('open')) close();
      });
    })();
  </script>
