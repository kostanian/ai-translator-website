(function () {
  const urlLang = new URLSearchParams(window.location.search).get("lang");
  let lang = (urlLang && T_TERMS[urlLang]) ? urlLang
             : (localStorage.getItem("uiLanguage") || "ru");
  if (!T_TERMS[lang]) lang = "ru";

  function apply(l) {
    document.documentElement.lang = l;
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const val = T_TERMS[l]?.[el.dataset.i18n] || T_TERMS.en?.[el.dataset.i18n] || "";
      if (val) el.innerHTML = val;
    });
    document.title = T_TERMS[l].t_title + " — Selection Translate AI";
    document.querySelectorAll(".lang-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.lang === l));
  }

  apply(lang);

  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      lang = btn.dataset.lang;
      localStorage.setItem("uiLanguage", lang);
      apply(lang);
    });
  });

  const nav = document.getElementById("nav");
  window.addEventListener("scroll", () => {
    nav.classList.toggle("scrolled", window.scrollY > 10);
  }, { passive: true });
})();
</script>
